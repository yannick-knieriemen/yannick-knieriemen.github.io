name: Check links

on:
  workflow_dispatch:
  schedule:
    # 06:00 UTC on the 1st of every month
    - cron: "0 6 1 * *"

jobs:
  link-check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # v2.9.0
        with:
          # linkedin.com (999) and ifo.de (503) block bots. Accept those
          # statuses instead of excluding the URLs entirely, so every link
          # is still requested and hard 404s/DNS failures are caught.
          args: --no-progress --accept '200..=204,403,429,503,999' index.html
          fail: false

      - name: Open issue on broken links
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@e8ef132d6df98ed982188e460ebb3b5d4ef3a9cd # v5.0.1
        with:
          title: "Broken links on homepage"
          content-filepath: ./lychee/out.md
          labels: automated
