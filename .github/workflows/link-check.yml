name: Check links

on:
  workflow_dispatch:
  schedule:
    # 06:00 UTC on the 1st of every month
    - cron: "0 6 1 * *"

jobs:
  link-check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Run lychee
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # linkedin.com blocks bots (HTTP 999) -> false positives
          args: --no-progress --exclude 'linkedin\.com' index.html
          fail: false

      - name: Open issue on broken links
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Broken links on homepage"
          content-filepath: ./lychee/out.md
          labels: automated
