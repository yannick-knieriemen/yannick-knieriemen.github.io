name: Retry Pages deploy failures

on:
  workflow_run:
    workflows: ["pages build and deployment"]
    types: [completed]

permissions:
  actions: write

jobs:
  retry-deploy:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.run_attempt < 3
    runs-on: ubuntu-latest
    steps:
      - name: Retry failed deploy job
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const runId = context.payload.workflow_run.id;

            const jobs = await github.paginate(
              github.rest.actions.listJobsForWorkflowRun,
              { owner, repo, run_id: runId, per_page: 100 }
            );

            const failedDeployJob = jobs.find(
              (job) => job.name === "deploy" && job.conclusion === "failure"
            );

            if (!failedDeployJob) {
              core.info(`No failed deploy job found in run ${runId}; skipping rerun.`);
              return;
            }

            await github.rest.actions.reRunWorkflowFailedJobs({
              owner,
              repo,
              run_id: runId,
            });

            core.info(`Requested rerun for failed jobs in run ${runId}.`);
